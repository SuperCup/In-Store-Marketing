name: Daily GEO Content

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "30 1 * * *"

permissions:
  contents: write

concurrency:
  group: daily-geo-content
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    env:
      AI_PROVIDER: ${{ vars.AI_PROVIDER }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      KIMI_BASE_URL: ${{ vars.KIMI_BASE_URL }}
      KIMI_MODEL: ${{ vars.KIMI_MODEL }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_BASE_URL: ${{ vars.AI_BASE_URL }}
      AI_MODEL: ${{ vars.AI_MODEL }}
      ARTICLES_PER_DAY: "3"
      AI_REQUIRED: ${{ vars.AI_REQUIRED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate and build content
        run: node scripts/publish-today.mjs

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/articles content/reviews data
          if git diff --cached --quiet; then
            echo "No generated content changes to commit."
          else
            git commit -m "chore: generate daily content [skip ci]"
            git push
          fi

      - name: Deploy static site to gh-pages branch
        run: |
          publish_dir="$(mktemp -d)"
          cp -R dist/. "$publish_dir/"
          git -C "$publish_dir" init -b gh-pages
          git -C "$publish_dir" config user.name "github-actions[bot]"
          git -C "$publish_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$publish_dir" add .
          git -C "$publish_dir" commit -m "deploy static site"
          git -C "$publish_dir" remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "$publish_dir" push --force origin gh-pages
